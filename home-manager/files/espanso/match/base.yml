    replace: "which"
    word: true
    propagate_case: true

  - trigger: "wont"
    replace: "won't"
    word: true
    propagate_case: true

  # Frequent French-to-English vocabulary slips.
  - trigger: "lexique"
    replace: "lexicon"
    word: true
    propagate_case: true

  - trigger: "informations"
    replace: "information"
    word: true
    propagate_case: true

  - trigger: "advices"
    replace: "advice"
    word: true
    propagate_case: true

  - trigger: "softwares"
    replace: "software"
    word: true
    propagate_case: true

  # Small phrase-level fixes that are unlikely to appear in code.
  - trigger: "this two"
    replace: "these two"
    propagate_case: true

  - trigger: "andcome"
    replace: "and come"
    word: true

  - trigger: "auto correction"
    replace: "autocorrection"
    propagate_case: true

  - trigger: "autoccorection"
    replace: "autocorrection"
    word: true
    propagate_case: true

  # Research/benchmark vocabulary shortcuts. These are explicit shortcuts, not forced rewrites.
  - trigger: ":bb"
    replace: "baseline bakeoff"

  - trigger: ":ftax"
    replace: "failure taxonomy"

  - trigger: ":fana"
    replace: "failure analysis"

  - trigger: ":msweep"
