# =============================================================================
# HYPRLAND AUTOSTART CONFIG
# =============================================================================
# 
# Cold-boot restore strategy:
# session-restore.sh reopens the core GUI workspace after login
#
# =============================================================================

# Start Omarchy UI services inside the Hyprland session.
# Note: graphical-session.target refuses manual start, so we start the units directly.
exec-once = /run/current-system/sw/bin/systemctl --user start omarchy-waybar.service omarchy-swaybg.service
exec-once = /run/current-system/sw/bin/systemctl --user start opencode-session-save.service

# Hyprland does not reliably start the Secret Service on its own, so bootstrap it
# early and publish the keyring/SSH agent paths to user services and D-Bus activation.
exec-once = /run/current-system/sw/bin/bash -lc '/run/wrappers/bin/gnome-keyring-daemon --start --components=secrets >/dev/null 2>&1 || true; export GNOME_KEYRING_CONTROL="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}/keyring"; export SSH_AUTH_SOCK="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}/gcr/ssh"; /run/current-system/sw/bin/systemctl --user import-environment XDG_RUNTIME_DIR GNOME_KEYRING_CONTROL SSH_AUTH_SOCK; /run/current-system/sw/bin/dbus-update-activation-environment --systemd XDG_RUNTIME_DIR GNOME_KEYRING_CONTROL SSH_AUTH_SOCK'

# GUI window persistence (disabled for stability; restores can leave broken/tiny layouts)
# exec-once = /home/elwalid/.local/bin/hyprsession --mode default --save-interval 30

# Core daemons and desktop UI (hypridle/mako/swayosd/fcitx5/waybar/swaybg)
# are started by Omarchy default autostart.
exec-once = uwsm-app -- hyprsunset

# Hyprshell is reliable once Hyprland is fully up; restart it after login to avoid
# user-systemd environment timing races.
exec-once = sleep 2 && /run/current-system/sw/bin/systemctl --user restart hyprshell.service

# Rebuild the main GUI workspace after a cold boot.
exec-once = sleep 3 && /home/elwalid/.config/hypr/scripts/session-restore.sh

# Disabled: do not auto-open a terminal on login.
# exec-once = sleep 3 && (hyprctl clients | grep -q '^Window ' || /run/current-system/sw/bin/kitty)

# Waybar and swaybg are now managed by user services enabled on graphical-session.
# Keep this launcher disabled to prevent duplicate bars/wallpapers on login.
# exec-once = sleep 2 && /home/elwalid/.local/bin/omarchy-start-shell-ui
