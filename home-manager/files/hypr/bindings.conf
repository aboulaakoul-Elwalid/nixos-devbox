# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
$terminal = /run/current-system/sw/bin/kitty
$browser = omarchy-launch-browser

# Unbind conflicting omarchy defaults
unbind = SUPER, O  # Disable "Pop window out" from tiling-v2, we use O for Obsidian
unbindd = SUPER, O
unbind = SUPER, TAB  # Let Hyprshell handle window switching
unbindd = SUPER, TAB
unbind = SUPER SHIFT, TAB  # Let Hyprshell handle window switching
unbindd = SUPER SHIFT, TAB
unbind = SUPER, T  # Disable "Toggle floating" from tiling-v2, we use T for btop
unbindd = SUPER, T
unbind = SUPER, F  # Disable "Full screen" from tiling-v2, we use F for file manager
unbindd = SUPER, F
unbind = SUPER, W  # Override default killactive with our undo-able version
unbindd = SUPER, W
unbind = CTRL ALT, DELETE  # Override Omarchy close-all with Hyprshell panic stop
unbindd = CTRL ALT, DELETE
unbind = SUPER CTRL, DELETE  # Primary escape key combo
unbindd = SUPER CTRL, DELETE
unbind = SUPER CTRL, X  # Dictation is managed by local Voxtype config
unbindd = SUPER CTRL, X

# Hyprshell workspace switcher (manual deterministic mode)
# Clean baseline: hyprshell handles SUPER+TAB internally from ~/.config/hyprshell/config.toml.
# PRIMARY escape: Super+Ctrl+Delete — always reaches Hyprland.
bindld = SUPER CTRL, DELETE, Kill blocked Hyprshell, exec, /home/elwalid/.local/bin/hyprshell-panic
# FALLBACK: Ctrl+Alt+Delete — may be intercepted by kernel/logind.
bindld = CTRL ALT, DELETE, Kill blocked Hyprshell, exec, /home/elwalid/.local/bin/hyprshell-panic

# Window close with undo support
bindd = SUPER, W, Close window (undoable), exec, ~/.local/bin/hypr-close-window.sh
bindd = SUPER SHIFT, W, Restore last closed window, exec, ~/.local/bin/hypr-restore-window.sh

bindd = SUPER, return, Terminal, exec, $terminal --directory="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER, F, File manager, exec, uwsm-app -- nautilus --new-window
unbind = SUPER, B
unbindd = SUPER, B
bindd = SUPER, B, Browser, exec, /home/elwalid/.local/bin/omarchy-launch-browser
unbind = SUPER SHIFT, B
unbindd = SUPER SHIFT, B
bindd = SUPER SHIFT, B, Browser (private), exec, /home/elwalid/.local/bin/omarchy-launch-browser --private
bindd = SUPER, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER, N, Editor, exec, omarchy-launch-editor
bindd = SUPER, T, Activity, exec, omarchy-launch-tui btop
bindd = SUPER SHIFT, T, Toggle window floating/tiling, togglefloating,
bindd = SUPER, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER, G, Signal, exec, omarchy-launch-or-focus signal "uwsm app -- signal-desktop"
bindd = SUPER, O, Obsidian, exec, omarchy-launch-or-focus obsidian "uwsm app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER, slash, Passwords, exec, uwsm app -- 1password
bindd = SUPER, S, Save ActivityWatch stats, exec, ~/.local/bin/aw-save-today.sh
bindd = SUPER, H, Toggle dictation, exec, voxtype record toggle

# Compositor zoom, macOS-style around the cursor.
bindd = SUPER SHIFT, mouse_up, Zoom out at cursor, exec, bash /home/elwalid/.local/bin/hypr-zoom out 0.25
bindd = SUPER SHIFT, mouse_down, Zoom in at cursor, exec, bash /home/elwalid/.local/bin/hypr-zoom in 0.25
bindd = SUPER CTRL, equal, Zoom in at cursor, exec, bash /home/elwalid/.local/bin/hypr-zoom in 0.50
bindd = SUPER CTRL, minus, Zoom out at cursor, exec, bash /home/elwalid/.local/bin/hypr-zoom out 0.50
bindd = SUPER CTRL, code:19, Reset screen zoom, exec, bash /home/elwalid/.local/bin/hypr-zoom reset

# If your web app url contains #, type it as ## to prevent hyperland treat it as comments
bindd = SUPER, A, OpenCode (Kitty), exec, uwsm-app -- /run/current-system/sw/bin/kitty --directory="$(omarchy-cmd-terminal-cwd)" /home/elwalid/.local/bin/oc
bindd = SUPER SHIFT, A, OpenCode Desktop, exec, uwsm-app -- /home/elwalid/.local/bin/opencode
bindd = SUPER, Z, Zed, exec, zed
bindd = SUPER SHIFT, E, Restore Apps, exec, /home/elwalid/.config/hypr/scripts/session-restore.sh
unbind = SUPER SHIFT, R
unbindd = SUPER SHIFT, R
bindd = SUPER SHIFT, R, Session resume panel, exec, /home/elwalid/.local/bin/session-resume-panel

bindd = SUPER, Y, YouTube, exec, omarchy-launch-or-focus-webapp YouTube "https://youtube.com/"
bindd = SUPER SHIFT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER ALT, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

# Walker launcher
# Note: Walker handles its own launcher, no hyprshell needed
# SUPER+SPACE is owned by hypr_overrides.conf (omarchy-menu).
# Launcher lives on ALT+SPACE in hypr_overrides.conf.
unbind = SUPER CTRL, SPACE
unbindd = SUPER CTRL, SPACE
bindd = SUPER CTRL, SPACE, Next wallpaper in theme, exec, omarchy-theme-bg-next

unbind = SUPER SHIFT CTRL, SPACE
unbindd = SUPER SHIFT CTRL, SPACE
bindd = SUPER SHIFT CTRL, SPACE, Theme menu, exec, omarchy-menu style

unbind = SUPER CTRL, E
unbindd = SUPER CTRL, E
bindd = SUPER CTRL, E, Emoji picker (walker), exec, ~/.local/bin/omarchy-launch-walker -m symbols

unbind = SUPER CTRL, V
unbindd = SUPER CTRL, V
bindd = SUPER CTRL, V, Clipboard manager (walker), exec, ~/.local/bin/omarchy-launch-walker -m clipboard
