# A higher max-gamma allows you to increase brightness beyond 100%
# This can be useful on dim monitors, but be careful not to wash out colors.
max-gamma = 120

# Return to normal colors at 6 AM.
profile {
    time = 6:00          # Time to activate this profile (6:00 AM)
    identity = true      # Resets color temperature to normal
    gamma = 1.0          # Normal gamma (100%)
}

# Keep the night-light active from 2 AM through 6 AM.
profile {
    time = 2:00          # Time to activate this profile (2:00 AM)
    temperature = 3400   # A warmer temperature (lower is warmer)
    gamma = 0.6          # Slightly reduce gamma/brightness
}
