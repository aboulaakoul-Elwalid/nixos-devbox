# Canonical keybind overrides (single source of truth)
unbind = SUPER, SPACE
unbind = SUPER ALT, SPACE
unbind = SUPER, return
unbind = SUPER, RETURN
unbind = SUPER SHIFT, SPACE
unbind = ALT, SPACE
unbind = ALT, RETURN
unbind = ALT, W

# Restore Omarchy-style launcher and terminal
bind = SUPER, SPACE, exec, /home/elwalid/.local/bin/omarchy-menu
bind = SUPER, RETURN, exec, /run/current-system/sw/bin/kitty --directory="$(omarchy-cmd-terminal-cwd)"
bind = SUPER, ENTER, exec, /run/current-system/sw/bin/kitty --directory="$(omarchy-cmd-terminal-cwd)"

# Safe fallback keys
bind = ALT, SPACE, exec, /home/elwalid/.local/bin/omarchy-launch-walker
bind = ALT, RETURN, exec, /run/current-system/sw/bin/kitty --directory="$(omarchy-cmd-terminal-cwd)"
bind = ALT, ENTER, exec, /run/current-system/sw/bin/kitty --directory="$(omarchy-cmd-terminal-cwd)"

# SUPER+TAB is owned by hyprshell (clean baseline mode).
