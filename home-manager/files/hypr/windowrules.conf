# Sioyek window rules for Wayland (Hyprland 0.53+ syntax)
# Float helper window (portal/preview feature)
windowrule = float on, match:class ^(sioyek)$, match:title ^(Sioyek Helper_window)$

# Let btop open as a normal tiled window instead of Omarchy's small floating TUI size.
windowrule = tag -floating-window, match:class ^(org\.omarchy\.btop)$
windowrule = tile on, match:class ^(org\.omarchy\.btop)$

# Daily workspace placement.
windowrule = workspace 1 silent, match:initial_class ^(brave-browser)$
windowrule = workspace 2 silent, match:initial_class ^(obsidian)$
windowrule = workspace 2 silent, match:initial_class ^(electron)$, match:initial_title ^(.* - Obsidian.*)$
windowrule = workspace 3 silent, match:initial_class ^(dev\.zed\.Zed)$
windowrule = workspace 4 silent, match:initial_class ^(kitty)$, match:initial_title ^(OpenCode::.*)$

# Note: nofocus and noborder rules removed - not supported in Hyprland 0.53.3
# The float rule above should be sufficient for the helper window
