# Extra env variables
# env = MY_GLOBAL_ENV,setting

# Ensure Omarchy scripts can resolve their base path in Hypr/Walker launches.
env = OMARCHY_PATH,/home/elwalid/.local/share/omarchy

# Ensure Hypr keybind/menu commands can resolve Omarchy and local scripts.
env = PATH,/home/elwalid/.local/share/omarchy/bin:/home/elwalid/.local/bin:/run/wrappers/bin:/home/elwalid/.local/share/flatpak/exports/bin:/var/lib/flatpak/exports/bin:/home/elwalid/.nix-profile/bin:/nix/profile/bin:/home/elwalid/.local/state/nix/profile/bin:/etc/profiles/per-user/elwalid/bin:/nix/var/nix/profiles/default/bin:/run/current-system/sw/bin

# Reuse the GCR/gnome-keyring SSH agent so GitHub prompts only once per login.
env = SSH_AUTH_SOCK,/run/user/1000/gcr/ssh
